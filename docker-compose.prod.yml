name: koga-lease-mdm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koga_mdm}
      POSTGRES_USER: ${POSTGRES_USER:-koga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koga} -d ${POSTGRES_DB:-koga_mdm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-koga}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-koga_mdm}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro
      - ./backups:/app/backups
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  admin-web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-https://api.example.com}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-https://api.example.com}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  customer-web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.customer
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-https://api.example.com}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-https://api.example.com}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3002"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - admin-web
      - customer-web
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      CUSTOMER_DOMAIN: ${CUSTOMER_DOMAIN:?CUSTOMER_DOMAIN is required}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
